name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── JOB 1 ──────────────────────────────────────────────────────────
  # Code quality. Warns but never blocks (|| true).
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (non-blocking)
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-exclude=__pycache__,.git \
            || true

  # ── JOB 2 ──────────────────────────────────────────────────────────
  # Secret scan. Fails the pipeline if any committed .py leaks a key.
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Scan .py files for committed secrets
        run: |
          set -e
          FOUND=0
          for PATTERN in \
            "sk-ant-[A-Za-z0-9]{20,}" \
            "gsk_[A-Za-z0-9]{20,}" \
            "aws_secret_access_key[[:space:]]*=[[:space:]]*[\"'][A-Za-z0-9/+]{20,}"; do
            echo "Scanning for: $PATTERN"
            MATCHES=$(grep -rInE --include="*.py" \
              -e "$PATTERN" . || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Real secret found:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -ne 0 ]; then
            echo "Secret scan FAILED — remove the secret(s) above before committing."
            exit 1
          fi
          echo "No secrets found."

  # ── JOB 3 ──────────────────────────────────────────────────────────
  # Import smoke test. Fails if any module cannot be loaded.
  imports:
    name: Import check
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f sanctions_triage/requirements.txt ]; then
            pip install -r sanctions_triage/requirements.txt
          fi

      - name: Import all live modules
        env:
          # src modules import each other by bare name; agent.py also
          # adds its own dir to sys.path, but we set it explicitly so
          # `import tools` / `import db` etc. resolve in CI too.
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/sanctions_triage/src
        run: |
          python - <<'PY'
          import importlib, sys

          modules = [
              # Root level
              "alert_intake",
              "sanction_engine",
              "workflow_ui",
              # sanctions_triage/src
              "tools",
              "hooks",
              "worksheet",
              "agent",
              "memory",
              "db",
          ]

          failed = []
          for name in modules:
              try:
                  importlib.import_module(name)
                  print(f"OK   {name}")
              except Exception as exc:
                  print(f"FAIL {name}: {exc.__class__.__name__}: {exc}")
                  failed.append(name)

          if failed:
              print(f"\nImport check FAILED for: {', '.join(failed)}")
              sys.exit(1)
          print("\nAll modules imported successfully.")
          PY

  # ── JOB 4 ──────────────────────────────────────────────────────────
  # Data validation. prior_cases.json must exist and be valid JSON.
  # sanctions.db is optional (warn only).
  validate_data:
    name: Validate data files
    runs-on: ubuntu-latest
    needs: imports
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check sanctions.db (warn only)
        run: |
          if [ -f sanctions.db ]; then
            SIZE=$(du -h sanctions.db | cut -f1)
            echo "sanctions.db found (size: $SIZE)."
          else
            echo "::warning::sanctions.db not found — continuing without failing."
          fi

      - name: Validate prior_cases.json
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path

          path = Path("sanctions_triage/data/prior_cases.json")
          if not path.exists():
              print(f"::error::{path} does not exist.")
              sys.exit(1)

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              print(f"::error::{path} is not valid JSON: {exc}")
              sys.exit(1)

          count = len(data) if hasattr(data, "__len__") else "n/a"
          print(f"prior_cases.json is valid JSON — {count} records.")
          PY

  # ── JOB 5 ──────────────────────────────────────────────────────────
  # Unit tests. pytest suite under tests/unit/ (conftest puts
  # sanctions_triage/src on sys.path). Evals under tests/evals/ are NOT
  # run here — they hit live DynamoDB + the Claude API.
  unit_tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: imports
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f sanctions_triage/requirements.txt ]; then
            pip install -r sanctions_triage/requirements.txt
          fi
          pip install pytest

      - name: Run pytest
        run: pytest tests/unit/ -v
